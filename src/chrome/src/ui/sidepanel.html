<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebBrain</title>
  <link rel="stylesheet" href="../../styles/sidepanel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <h1>WebBrain</h1>
        <span id="status-dot" class="status-dot offline" title="Disconnected"></span>
      </div>
      <div class="header-right">
        <select id="provider-select" title="LLM Provider"></select>
        <button id="btn-settings" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        <button id="btn-clear" title="New conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Chat Messages -->
    <div id="chat-container">
      <div id="messages">
        <div class="message system">
          <div class="message-content">
            <p>Hi! I'm <strong>WebBrain</strong>. I can read this page, answer questions, click buttons, fill forms, and automate multi-step tasks.</p>
            <p class="hint">Try: "Summarize this page" or "Find all links about pricing"</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Agent Activity Indicator -->
    <div id="agent-activity" class="hidden">
      <div class="activity-spinner"></div>
      <span id="activity-text">Thinking...</span>
      <button id="btn-stop" title="Stop agent">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
        Stop
      </button>
    </div>

    <!-- Act Mode Warning Banner -->
    <div id="act-warning" class="hidden">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>Act mode: WebBrain will interact with pages on your behalf. Use at your own risk.</span>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <div id="mode-toggle">
        <button id="btn-mode-ask" class="mode-btn active" title="Ask questions about the page — no changes made">Ask</button>
        <button id="btn-mode-act" class="mode-btn" title="Let WebBrain click, type, and navigate for you">Act</button>
      </div>
      <div id="input-wrapper">
        <textarea id="user-input" placeholder="Ask anything about this page..." rows="1"></textarea>
        <button id="btn-send" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
